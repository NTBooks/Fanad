name: Publish Docker image

# Builds the multi-arch Fanad image and pushes it to GHCR. Runs when a GitHub Release is
# published; can also be triggered by hand for a specific tag. The Home Assistant App's
# config.yaml points its `image:` at ghcr.io/ntbooks/fanad-app.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version to build (e.g. 0.2.0)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version (strip leading v)
        id: v
        run: |
          RAW="${{ github.event.release.tag_name || inputs.tag }}"
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ntbooks/fanad-app:${{ steps.v.outputs.version }}
            ghcr.io/ntbooks/fanad-app:latest
